name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile checks
        run: python -m compileall agentic_robot recovery tests
      - name: Format / lint (ruff)
        run: ruff check agentic_robot
      - name: Types (mypy)
        run: mypy agentic_robot
      - name: Unit + integration + schema + skill tests
        run: pytest -q
